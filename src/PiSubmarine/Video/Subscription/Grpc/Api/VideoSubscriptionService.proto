syntax = "proto3";

package pisubmarine.video.subscription.grpc.api;

message ErrorPayload
{
  int32 error_condition = 1;
  string error_category = 2;
  int32 error_code = 3;
}

message Empty
{
}

message Endpoint
{
  string host = 1;
  uint32 port = 2;
}

message SubscribeRequest
{
  string lease_id = 1;
  Endpoint endpoint = 2;
}

message UnsubscribeRequest
{
  string lease_id = 1;
}

message VoidResult
{
  oneof value
  {
    Empty success = 1;
    ErrorPayload error = 2;
  }
}

service VideoSubscriptionService
{
  rpc Subscribe(SubscribeRequest) returns (VoidResult);
  rpc Unsubscribe(UnsubscribeRequest) returns (VoidResult);
}
